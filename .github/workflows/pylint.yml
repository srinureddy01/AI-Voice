name: JARVIS Quality Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Testing on the most relevant modern versions
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6  # Updated to the latest version
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # This speeds up your workflow by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint edge-tts pygame speechrecognition google-genai
        # We install all your project's needs so pylint doesn't give "import errors"

    - name: Analysing the code with pylint
      run: |
        # We ignore 'config.py' because it's usually in your .gitignore 
        # and would cause pylint to fail if it can't find the file.
        pylint $(git ls-files '*.py' | grep -v 'config.py')
